<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My Website</title>
    <style>
        /* 
           FANCY CSS ENHANCEMENTS:
           - Added 'box-shadow' for depth
           - Added 'border-radius' for soft edges
           - Added 'transition' for smooth hover effects
           - Added 'backdrop-filter' for a glass-morphism effect
        */

        body {
            margin: 0;
            padding: 0;
            font-family: 'Cambria', 'Times New Roman', serif;
            font-size: 14px;
            /* Fancy Gradient Background instead of flat color */
            background: linear-gradient(135deg, #ADD8E6 0%, #87CEEB 100%);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            width: 80%;
            max-width: 800px;
            
            /* GLASSMORPHISM EFFECT */
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            
            padding: 50px;
            border-radius: 20px; /* More rounded corners */
            box-shadow: 0 15px 35px rgba(0, 0, 139, 0.15); /* Soft blue shadow */
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        h1 {
            color: #00008B;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px; /* Spaced out letters for elegance */
            font-size: 28px; /* Slightly larger title for impact */
        }

        .scrolling-wrapper {
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            background: linear-gradient(90deg, #e0f7fa, #ffffff, #e0f7fa);
            padding: 15px 0;
            border-radius: 50px; /* Pill shape */
            border: 2px solid #0000FF;
            box-shadow: inset 0 0 10px rgba(0,0,255,0.1);
        }

        .scrolling-text {
            display: inline-block;
            padding-left: 100%;
            animation: scroll-left 12s linear infinite;
            color: #00008B;
            font-weight: bold;
            font-size: 16px;
        }

        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .image-box {
            background-color: #fff;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #0000FF;
            color: #0000FF;
            font-style: italic;
            
            /* FANCY HOVER EFFECT FOR BOXES */
            border-radius: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        /* Make boxes "pop" when hovered */
        .image-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 255, 0.2);
            background-color: #f0f8ff;
        }

        .action-button {
            background: linear-gradient(45deg, #0000FF, #00008B); /* Gradient Button */
            color: white;
            border: none;
            padding: 15px 35px;
            font-family: 'Cambria', serif;
            font-size: 16px;
            cursor: pointer;
            border-radius: 50px; /* Pill shaped button */
            transition: all 0.3s ease;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 255, 0.3);
            font-weight: bold;
            letter-spacing: 1px;
        }

        .action-button:hover {
            transform: scale(1.05); /* Grows slightly on hover */
            box-shadow: 0 8px 20px rgba(0, 0, 255, 0.5);
        }

    </style>
</head>
<body>

    <div class="grid-container">
        <header>
            <h1>Welcome to My Website</h1>
            <p>A modern web design demonstration using CSS Grid & Animations.</p>
        </header>

        <section class="scrolling-wrapper">
            <div class="scrolling-text">
                 Welcome to our digital space! We use modern CSS animations for smooth scrolling effects. &nbsp;&nbsp;&nbsp; Explore our grid layout below. ✨
            </div>
        </section>

        <section class="image-grid">
            <div class="image-box">Feature 1</div>
            <div class="image-box">Feature 2</div>
            <div class="image-box">Feature 3</div>
        </section>

        <footer>
            <button class="action-button">Get Started</button>
        </footer>
    </div>

</body>
</html>
